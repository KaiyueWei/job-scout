name: Job Scout Pipeline

on:
  schedule:
    # 8:00 AM Pacific (16:00 UTC)
    - cron: '0 16 * * *'
    # 6:00 PM Pacific (02:00 UTC next day)
    - cron: '0 2 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Scout
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CLOUDCONVERT_API_KEY: ${{ secrets.CLOUDCONVERT_API_KEY }}
          CONVERTAPI_SECRET: ${{ secrets.CONVERTAPI_SECRET }}
          CV_PATH: ${{ github.workspace }}/templates/cv.pdf
          CV_TEMPLATE_PATH: ${{ github.workspace }}/templates/cv_template.docx
        run: python -m src.main

      - name: Upload artifacts (tailored CVs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tailored-cvs-${{ github.run_number }}
          path: output/*.pdf
          retention-days: 30
          if-no-files-found: ignore
