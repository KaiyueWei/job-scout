    - "staff"
    - "director"
    - "vp "
    - "head of"
    - "10+ years"
    - "8+ years"
    - "7+ years"

  # ATS priority keywords used by the LLM ranker
  priority_keywords:
    - "Go"
    - "Golang"
    - "Python"
    - "TypeScript"
    - "Node.js"
    - "Kubernetes"
    - "Docker"
    - "Terraform"
    - "AWS"
    - "GCP"
    - "PostgreSQL"
    - "Redis"
    - "CI/CD"
    - "distributed systems"
    - "intern"
    - "co-op"

  # LLM rank score required to generate a tailored CV
  tailor_threshold: 8

