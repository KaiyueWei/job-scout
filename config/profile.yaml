# Job Scout Configuration

profile:
  name: "Kaiyue Wei"
  email: "kaiyue.wei@outlook.com"
  github_username: "KaiyueWei"

search:
  # LinkedIn search roles (one search per role × location)
  roles:
    - "software engineer intern"
    - "software developer co-op"
    - "backend engineer intern"
    - "devops engineer intern"
    - "SRE intern"
    - "platform engineer intern"
